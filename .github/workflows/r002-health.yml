name: R-002 Health Gate Verification
on: [workflow_dispatch]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: pip install flask pymysql requests -q
      - name: Run unit tests
        env:
          DASHBOARD_API_KEY: ${{ secrets.DASHBOARD_API_KEY }}
        run: |
          python3 docker/idx/tests/test_health_gate.py
